<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Async Board</title>
    <style>

/* 全体の背景とフォント */
body {
    font-family: "Segoe UI", sans-serif;
    background: #fafafa;
    margin: 0;
    padding: 20px;
}

/* チャット表示エリア */
#chat {
    width: 100%;
    height: 400px;              /* ← これが重要（隠れ防止） */
    overflow-y: auto;
    background: #f5f5f5;
    padding: 10px;
    box-sizing: border-box;
    border-radius: 10px;
    border: 1px solid #ddd;
}

/* メッセージ共通 */
.msg {
    margin: 10px 0;
    display: flex;
    flex-direction: column;
    max-width: 70%;
}

.message {
    margin: 8px;
    padding: 8px 12px;
    border-radius: 8px;
    max-width: 70%;
}

.message.me {
    background: #d1f0ff;
    margin-left: auto;   /* ★ 右側へ */
    text-align: right;
}

.message.other {
    background: #ffffff;
    margin-right: auto;  /* ★ 左側へ */
    text-align: left;
}

.delete-btn {
    font-size: 12px;
    margin-left: 10px;
}


/* 名前表示 */
.name {
    font-size: 12px;
    color: #666;
    margin-bottom: 3px;
}

/* メッセージ吹き出し */
.bubble {
    background: #fff;
    padding: 8px 12px;
    border-radius: 10px;
    display: inline-block;
    font-size: 14px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.1);
}

/* 自分の吹き出し色 */
.msg.me .bubble {
    background: #d1f5d3;
}

/* 時刻表示 */
.meta {
    font-size: 11px;
    color: #999;
    margin-top: 3px;
}

@media (max-width: 600px) {
    #user {
        font-size: 14px;
    }
    #chat {
        height: calc(100dvh - 180px); /* スマホ専用の安定版 */
    }
    #msg {
        font-size: 14px;
    }
}

.info{
    font-size:0.8rem;
    color:darkgreen
}
h4{
    text-align:center;
    background-color:aquamarine;
    padding:5px 0;
}
    </style>
</head>
<body>
    <h4>　非同期 WebSocket 掲示板（最小構成）</h4>
    <div id="user-area">
        名前：<input id="user" placeholder="最初に名前を入力してね。" onkeydown="if(event.key==='Enter') initChat();">
        <br><span class="info">↑ 日本語の名前には空白を入れないでね（例：宮本武蔵）</span>
        <!-- <button onclick="initChat()">開始</button> または -->
    </div>
    <div id="chat"></div>

    <div id="input-area">
        <input id="msg" placeholder="メッセージ">
        <button onclick="sendMsg()">送信</button>
    </div>
    <script src="chat.js"></script>
</body>
</html>
